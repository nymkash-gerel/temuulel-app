name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  SUPABASE_SERVICE_ROLE_KEY: placeholder
  SUPABASE_SECRET_KEY: placeholder
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
  OPENAI_API_KEY: placeholder
  FACEBOOK_APP_SECRET: placeholder
  FACEBOOK_PAGE_ACCESS_TOKEN: placeholder
  MESSENGER_VERIFY_TOKEN: placeholder
  TELEGRAM_BOT_TOKEN: placeholder
  DRIVER_TELEGRAM_BOT_TOKEN: placeholder
  SENTRY_DSN: https://placeholder@sentry.io/0
  UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
  UPSTASH_REDIS_REST_TOKEN: placeholder

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: ESLint
        run: npx eslint src/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: TypeScript
        run: npx tsc --noEmit --skipLibCheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Vitest
        run: npx vitest run src/ --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Next.js Build
        run: npx next build
